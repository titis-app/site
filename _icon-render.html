<!doctype html>
<html><head><meta charset="utf-8"><style>
@font-face{font-family:'BFO';src:url('assets/BagelFatOne-latin.woff2') format('woff2');font-display:swap;}
html,body{margin:0;padding:0;background:#888;}
#icon{width:1024px;height:1024px;border-radius:230px;background:#fff6ea;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'BFO',sans-serif;box-sizing:border-box;}
.stack{display:flex;flex-direction:column;line-height:0.82;letter-spacing:-18px;}
.row{display:flex;justify-content:center;align-items:flex-end;}
.row.top{margin-bottom:-70px;}
.letter{display:inline-block;font-size:500px;line-height:1;transform-origin:50% 70%;}
.l1{color:#f2805c;transform:rotate(-9deg) translateY(0px);}
.l2{color:#f5c24a;transform:rotate(6deg) translateY(-20px);}
.l3{color:#7fbf7a;transform:rotate(-5deg) translateY(14px);}
.l4{color:#5aa0e6;transform:rotate(7deg) translateY(-12px);}
.l5{color:#b98be0;transform:rotate(-6deg) translateY(6px);}
</style></head>
<body>
<div id="icon">
  <div class="stack">
    <div class="row top">
      <span class="letter l1">t</span><span class="letter l2">i</span><span class="letter l3">t</span>
    </div>
    <div class="row">
      <span class="letter l4">i</span><span class="letter l5">s</span>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
<script>
window.__ready = false;
document.fonts.ready.then(() => {
  window.__fontReady = document.fonts.check('100px "BFO"');
  window.__ready = true;
});
window.renderIcon = async function() {
  await document.fonts.ready;
  const dataUrl = await htmlToImage.toPng(document.getElementById('icon'), {width:1024, height:1024, pixelRatio:1});
  return dataUrl;
};
</script>
</body></html>
