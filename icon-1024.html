<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&display=swap" rel="stylesheet"/>
<style>
  html,body{margin:0;padding:0;}
  html,body{width:1024px;height:1024px;overflow:hidden;background:transparent;}
  .icon{
    width:1024px;height:1024px;
    border-radius:230px;
    background:#fff6ea;
    position:relative;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    box-shadow:inset 0 -24px 0 rgba(0,0,0,0.03);
  }
  .logo{font-family:'Bagel Fat One',sans-serif;font-weight:400;}
  .stack{
    font-size:460px;
    line-height:0.82;
    letter-spacing:-12px;
    display:flex;flex-direction:column;
    padding:0 90px;box-sizing:border-box;width:100%;
    transform: translateY(2px);
  }
  .line{display:flex;justify-content:center;align-items:flex-end;gap:8px;}
  .line.line2{margin-top:-90px;}
  .letter{display:inline-block;transform-origin:50% 70%;line-height:1;}
</style>
</head>
<body>
  <div class="icon" id="icon">
    <div class="logo stack">
      <div class="line">
        <span class="letter" style="color:#f2805c;transform:rotate(-8deg) translateY(0px);">t</span>
        <span class="letter" style="color:#f5c24a;transform:rotate(6deg) translateY(-16px);">i</span>
        <span class="letter" style="color:#7fbf7a;transform:rotate(-5deg) translateY(8px);">t</span>
      </div>
      <div class="line line2">
        <span class="letter" style="color:#5aa0e6;transform:rotate(7deg) translateY(-12px);">i</span>
        <span class="letter" style="color:#b98be0;transform:rotate(-6deg) translateY(4px);">s</span>
      </div>
    </div>
  </div>
</body>
</html>
