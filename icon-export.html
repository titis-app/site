<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>titis — app icon export</title>
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
<style>
  :root { color-scheme: light; }
  html, body { margin: 0; padding: 0; background: #e9e4dc; font-family: Inter, sans-serif; color: #2a2320; }
  .page { min-height: 100vh; padding: 48px 24px 80px; display: flex; flex-direction: column; align-items: center; gap: 32px; }
  h1 { margin: 0; font-weight: 600; letter-spacing: -0.01em; font-size: 22px; }
  p.sub { margin: 0; color: #6a605a; font-size: 14px; text-align: center; max-width: 520px; line-height: 1.5; }

  /* Preview box — scaled down so the 1024×1024 canvas fits the viewport */
  .preview-frame {
    width: 360px; height: 360px;
    display: flex; align-items: center; justify-content: center;
    background: transparent;
  }
  .preview-frame .icon { transform: scale(calc(360 / 1024)); transform-origin: center; }

  /* THE ICON — authoritative 1024×1024 source. Captured as PNG. */
  .icon{
    width:1024px;height:1024px;
    border-radius:230px;
    background:#fff6ea;
    position:relative;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
  }
  .logo{font-family:'Bagel Fat One',sans-serif;font-weight:400;}
  .stack{
    font-size:460px;
    line-height:0.82;
    letter-spacing:-12px;
    display:flex;flex-direction:column;
    padding:0 90px;box-sizing:border-box;width:100%;
    transform: translateY(2px);
  }
  .line{display:flex;justify-content:center;align-items:flex-end;gap:8px;}
  .line.line2{margin-top:-90px;}
  .letter{display:inline-block;transform-origin:50% 70%;line-height:1;}

  /* Offscreen capture container — the real 1024×1024 copy we rasterize */
  #capture-host {
    position: absolute;
    top: -10000px; left: -10000px;
    pointer-events: none;
  }

  .controls { display: flex; flex-direction: column; gap: 12px; align-items: center; }
  .row-buttons { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  button {
    appearance: none; border: 0; cursor: pointer;
    font-family: inherit; font-weight: 600; font-size: 15px;
    padding: 12px 22px; border-radius: 999px;
    background: #2a2320; color: #fff6ea;
    transition: transform 120ms ease, background 120ms ease;
  }
  button:hover { transform: translateY(-1px); background: #3a2f2a; }
  button.secondary { background: transparent; color: #2a2320; border: 1.5px solid #2a2320; }
  button.secondary:hover { background: #2a2320; color: #fff6ea; }
  button:disabled { opacity: 0.5; cursor: wait; transform: none; }

  .status { font-size: 13px; color: #6a605a; min-height: 18px; }
  .status.ok { color: #3a7a3a; }
  .status.err { color: #b04a3a; }
</style>
</head>
<body>
<div class="page">
  <h1>titis — app icon</h1>
  <p class="sub">
    Fuente autoritativa del icono a 1024 × 1024 px. Pulsa <strong>Descargar PNG</strong> para guardarlo con el fondo crema (<code>#fff6ea</code>) incluido — listo para Expo / iOS / Android.
  </p>

  <!-- Visible preview (scaled down) -->
  <div class="preview-frame">
    <div class="icon" aria-label="titis app icon preview">
      <div class="logo stack">
        <div class="line">
          <span class="letter" style="color:#f2805c;transform:rotate(-8deg) translateY(0px);">t</span>
          <span class="letter" style="color:#f5c24a;transform:rotate(6deg) translateY(-16px);">i</span>
          <span class="letter" style="color:#7fbf7a;transform:rotate(-5deg) translateY(8px);">t</span>
        </div>
        <div class="line line2">
          <span class="letter" style="color:#5aa0e6;transform:rotate(7deg) translateY(-12px);">i</span>
          <span class="letter" style="color:#b98be0;transform:rotate(-6deg) translateY(4px);">s</span>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="row-buttons">
      <button id="btn-download">Descargar PNG 1024 × 1024</button>
      <button id="btn-download-2x" class="secondary">Descargar @2× (2048)</button>
    </div>
    <div class="status" id="status">El fondo crema <code>#fff6ea</code> se conserva en el PNG exportado.</div>
  </div>
</div>

<!-- Offscreen full-res copy used for capture (not transformed) -->
<div id="capture-host">
  <div class="icon" id="capture-icon">
    <div class="logo stack">
      <div class="line">
        <span class="letter" style="color:#f2805c;transform:rotate(-8deg) translateY(0px);">t</span>
        <span class="letter" style="color:#f5c24a;transform:rotate(6deg) translateY(-16px);">i</span>
        <span class="letter" style="color:#7fbf7a;transform:rotate(-5deg) translateY(8px);">t</span>
      </div>
      <div class="line line2">
        <span class="letter" style="color:#5aa0e6;transform:rotate(7deg) translateY(-12px);">i</span>
        <span class="letter" style="color:#b98be0;transform:rotate(-6deg) translateY(4px);">s</span>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  const btn1x = document.getElementById('btn-download');
  const btn2x = document.getElementById('btn-download-2x');
  const status = document.getElementById('status');
  const captureEl = document.getElementById('capture-icon');

  function setStatus(msg, cls) {
    status.textContent = msg;
    status.className = 'status' + (cls ? ' ' + cls : '');
  }

  async function waitForFont() {
    try {
      if (document.fonts && document.fonts.load) {
        await document.fonts.load('460px "Bagel Fat One"');
        await document.fonts.ready;
      }
    } catch (e) {}
    await new Promise(r => setTimeout(r, 150));
  }

  // Fetch Bagel Fat One woff2 bytes and return an @font-face CSS string
  // with the font embedded as a data: URL. This lets html-to-image bake
  // the font into its serialized SVG so the rasterizer doesn't fall back
  // to a generic sans-serif.
  let _fontCSSPromise = null;
  async function getFontEmbedCSS() {
    if (_fontCSSPromise) return _fontCSSPromise;
    _fontCSSPromise = (async () => {
      // Pull the Google-hosted CSS using a mobile UA so we get woff2
      const cssResp = await fetch(
        'https://fonts.googleapis.com/css2?family=Bagel+Fat+One&display=swap'
      );
      const cssText = await cssResp.text();
      // Find the Latin-subset @font-face (contains U+0000-00FF)
      const blocks = cssText.split('@font-face').slice(1);
      let latinBlock = blocks.find(b => /U\+0000-00FF/.test(b));
      if (!latinBlock) latinBlock = blocks[blocks.length - 1];
      const urlMatch = latinBlock.match(/url\((https:\/\/[^)]+\.woff2)\)/);
      if (!urlMatch) throw new Error('No woff2 URL found in Google Fonts CSS');
      const woffResp = await fetch(urlMatch[1]);
      const buf = await woffResp.arrayBuffer();
      // Binary → base64 (chunked to avoid stack overflow on large buffers)
      const bytes = new Uint8Array(buf);
      let bin = '';
      for (let i = 0; i < bytes.length; i += 0x8000) {
        bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
      }
      const b64 = btoa(bin);
      return (
        "@font-face{font-family:'Bagel Fat One';font-style:normal;" +
        "font-weight:400;font-display:block;" +
        "src:url(data:font/woff2;base64," + b64 + ") format('woff2');}"
      );
    })();
    return _fontCSSPromise;
  }

  // Load a dataURL into an HTMLImageElement
  function loadImage(src) {
    return new Promise((res, rej) => {
      const img = new Image();
      img.onload = () => res(img);
      img.onerror = rej;
      img.src = src;
    });
  }

  async function exportPNG(pixelRatio) {
    await waitForFont();
    const fontCSS = await getFontEmbedCSS();
    // 1. Rasterize to a transparent-safe PNG (corners outside the squircle are transparent).
    const rawDataUrl = await htmlToImage.toPng(captureEl, {
      width: 1024,
      height: 1024,
      pixelRatio,
      backgroundColor: '#fff6ea',
      cacheBust: true,
      fontEmbedCSS: fontCSS,
    });

    // 2. Flatten onto a fully opaque cream canvas so the output PNG has no
    //    alpha channel (no rgba transparency). This fills the squircle
    //    corners with the brand cream and produces a solid-background PNG.
    const size = 1024 * pixelRatio;
    const img = await loadImage(rawDataUrl);
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d', { alpha: false });
    ctx.fillStyle = '#fff6ea';
    ctx.fillRect(0, 0, size, size);
    ctx.drawImage(img, 0, 0, size, size);
    return canvas.toDataURL('image/png');
  }

  function triggerDownload(dataUrl, filename) {
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
  }

  async function handleClick(pixelRatio, filename, btn) {
    const originalLabel = btn.textContent;
    btn.disabled = true; btn1x.disabled = true; btn2x.disabled = true;
    btn.textContent = 'Generando…';
    setStatus('Renderizando el icono a ' + (1024 * pixelRatio) + 'px…');
    try {
      const dataUrl = await exportPNG(pixelRatio);
      triggerDownload(dataUrl, filename);
      setStatus('¡Listo! ' + filename + ' descargado.', 'ok');
    } catch (e) {
      console.error(e);
      setStatus('Error: ' + (e.message || e), 'err');
    } finally {
      btn.textContent = originalLabel;
      btn.disabled = false; btn1x.disabled = false; btn2x.disabled = false;
    }
  }

  btn1x.addEventListener('click', () => handleClick(1, 'titis-app-icon-1024.png', btn1x));
  btn2x.addEventListener('click', () => handleClick(2, 'titis-app-icon-2048.png', btn2x));

  // Pre-warm the font so the first click is snappy
  waitForFont();
})();
</script>
</body>
</html>
