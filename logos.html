<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>titis — logo explorations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      html, body { margin: 0; padding: 0; }
      body { font-family: Inter, system-ui, sans-serif; }
      .logo { font-family: 'Bagel Fat One', system-ui, sans-serif; font-weight: 400; }
    </style>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
    <script type="text/babel" src="design-canvas.jsx"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const ICON_SIZE = 240;
      const RADIUS = 54; // ~22% squircle

      // Squircle icon wrapper with optional subtle inner shadow for depth
      function Icon({ bg, children, style = {}, border }) {
        return (
          <div style={{
            width: ICON_SIZE, height: ICON_SIZE,
            borderRadius: RADIUS,
            background: bg,
            border: border || 'none',
            position: 'relative',
            overflow: 'hidden',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            boxShadow: 'inset 0 -6px 0 rgba(0,0,0,0.04), 0 10px 30px rgba(40,20,10,0.08)',
            ...style,
          }}>
            {children}
          </div>
        );
      }

      function Caption({ label, note }) {
        return (
          <div style={{ marginTop: 18, fontSize: 13, color: '#3a2e22' }}>
            <div style={{ fontWeight: 600, marginBottom: 2 }}>{label}</div>
            <div style={{ color: 'rgba(60,50,40,0.65)', lineHeight: 1.45 }}>{note}</div>
          </div>
        );
      }

      // ─── Variation 1 — Cream + Peach wordmark ───────────────────────
      function V1() {
        return (
          <Icon bg="#fff1e0">
            <div className="logo" style={{
              fontSize: 108, color: '#f2805c', letterSpacing: -2,
              lineHeight: 0.9, transform: 'translateY(4px)',
            }}>titis</div>
          </Icon>
        );
      }

      // ─── Variation 2 — Peach bg, cream type ─────────────────────────
      function V2() {
        return (
          <Icon bg="#f7a886">
            <div className="logo" style={{
              fontSize: 108, color: '#fff6ea', letterSpacing: -2,
              lineHeight: 0.9, transform: 'translateY(4px)',
            }}>titis</div>
          </Icon>
        );
      }

      // ─── Variation 3 — Dotted i's as bottle tops / milk drops ──────
      // The dots on the two i's get enlarged + tinted like a pair of little
      // bubbles. Plays with the fact that "titis" has two i-dots.
      function V3() {
        return (
          <Icon bg="#eaf4ff">
            <svg viewBox="0 0 240 240" width="240" height="240" style={{ overflow: 'visible' }}>
              <text x="120" y="158" textAnchor="middle"
                fontFamily="Bagel Fat One" fontSize="108"
                fill="#5aa0e6" letterSpacing="-2">titis</text>
              {/* oversized dots layered over the native dots */}
              <circle cx="63" cy="82" r="14" fill="#ffb4a0" />
              <circle cx="119" cy="82" r="14" fill="#ffd36e" />
              <circle cx="176" cy="82" r="14" fill="#ffb4a0" />
              {/* tiny highlight */}
              <circle cx="59" cy="78" r="4" fill="#fff6ea" opacity="0.9" />
              <circle cx="115" cy="78" r="4" fill="#fff6ea" opacity="0.9" />
              <circle cx="172" cy="78" r="4" fill="#fff6ea" opacity="0.9" />
            </svg>
          </Icon>
        );
      }

      // ─── Variation 4 — Single big 't' monogram ─────────────────────
      function V4() {
        return (
          <Icon bg="#3a2e2a">
            <div className="logo" style={{
              fontSize: 220, color: '#ffd5b5', letterSpacing: -4,
              lineHeight: 0.8, transform: 'translateY(14px)',
            }}>t</div>
            <div className="logo" style={{
              position: 'absolute', bottom: 22, right: 26,
              fontSize: 22, color: '#ffd5b5', opacity: 0.7, letterSpacing: -0.5,
            }}>titis</div>
          </Icon>
        );
      }

      // ─── Variation 5 — Horizontal stripe split (day/night) ─────────
      // A gentle horizontal band across the icon — alludes to a logbook's
      // ruled line, or the day/night rhythm of a baby's schedule.
      function V5() {
        return (
          <Icon bg="#fff1e0">
            <div style={{
              position: 'absolute', top: '50%', left: 0, right: 0, height: '50%',
              background: '#2b3a66',
            }} />
            <div className="logo" style={{
              position: 'relative',
              fontSize: 108, letterSpacing: -2, lineHeight: 0.9,
              transform: 'translateY(4px)',
            }}>
              {/* top half clipped orange, bottom clipped cream via two stacked copies */}
              <span style={{
                position: 'absolute', inset: 0,
                color: '#f2805c',
                clipPath: 'inset(0 0 50% 0)',
              }}>titis</span>
              <span style={{
                color: '#fff6ea',
                clipPath: 'inset(50% 0 0 0)',
              }}>titis</span>
            </div>
          </Icon>
        );
      }

      // ─── Variation 6 — Soft pastel rainbow wordmark ────────────────
      function V6() {
        const letters = ['t', 'i', 't', 'i', 's'];
        const colors = ['#f2805c', '#f5c24a', '#7fbf7a', '#5aa0e6', '#b98be0'];
        return (
          <Icon bg="#fff6ea">
            <div className="logo" style={{
              fontSize: 108, letterSpacing: -2, lineHeight: 0.9,
              transform: 'translateY(4px)', display: 'flex',
            }}>
              {letters.map((l, i) => (
                <span key={i} style={{ color: colors[i] }}>{l}</span>
              ))}
            </div>
          </Icon>
        );
      }

      // ─── Variation 6b — Two-line pastel rainbow ────────────────────
      // "tit" / "is" — bigger type since we have two lines to fill the icon.
      function V6b({ colors, align = 'center' }) {
        const c = colors || ['#f2805c', '#f5c24a', '#7fbf7a', '#5aa0e6', '#b98be0'];
        const lineStyle = {
          display: 'flex',
          justifyContent: align,
          lineHeight: 0.88,
          letterSpacing: -3,
        };
        return (
          <Icon bg="#fff6ea">
            <div className="logo" style={{
              fontSize: 150,
              transform: 'translateY(2px)',
              display: 'flex', flexDirection: 'column',
              width: '100%',
              padding: '0 22px',
              boxSizing: 'border-box',
            }}>
              <div style={lineStyle}>
                <span style={{ color: c[0] }}>t</span>
                <span style={{ color: c[1] }}>i</span>
                <span style={{ color: c[2] }}>t</span>
              </div>
              <div style={lineStyle}>
                <span style={{ color: c[3] }}>i</span>
                <span style={{ color: c[4] }}>s</span>
              </div>
            </div>
          </Icon>
        );
      }

      // ─── Variation 7 — Outlined / sticker style ────────────────────
      function V7() {
        return (
          <Icon bg="#ffd36e">
            <svg viewBox="0 0 240 240" width="240" height="240">
              <text x="120" y="158" textAnchor="middle"
                fontFamily="Bagel Fat One" fontSize="108"
                fill="#fff6ea" stroke="#3a2e2a" strokeWidth="6"
                paintOrder="stroke fill"
                letterSpacing="-2">titis</text>
            </svg>
          </Icon>
        );
      }

      // ─── Variation 8 — Blush with heart dot ────────────────────────
      function V8() {
        return (
          <Icon bg="#ffd9d0">
            <svg viewBox="0 0 240 240" width="240" height="240" style={{ overflow: 'visible' }}>
              <text x="120" y="158" textAnchor="middle"
                fontFamily="Bagel Fat One" fontSize="108"
                fill="#c94f6d" letterSpacing="-2">titis</text>
              {/* replace middle i-dot with a tiny heart */}
              <rect x="109" y="68" width="20" height="28" fill="#ffd9d0" />
              <path d="M119 96 L106 84 A7 7 0 0 1 119 75 A7 7 0 0 1 132 84 Z" fill="#c94f6d" />
            </svg>
          </Icon>
        );
      }

      // ─── Context row — icons at realistic home-screen size ─────────
      function HomeScreenPreview() {
        const size = 64;
        const rainbow = ['#f2805c', '#f5c24a', '#7fbf7a', '#5aa0e6', '#b98be0'];
        const variants = [
          { kind: 'line', bg: '#fff6ea', colors: rainbow, label: 'titis' },
          { kind: 'stack', bg: '#fff6ea', colors: rainbow },
          { kind: 'stack', bg: '#fff6ea', colors: ['#f2805c', '#f5a04a', '#f5c24a', '#e68aa8', '#c94f6d'] },
          { kind: 'stack', bg: '#fff6ea', colors: ['#5aa0e6', '#7fbf7a', '#5ac7c2', '#b98be0', '#8fb8d6'] },
          { kind: 'simple', bg: '#fff1e0', fg: '#f2805c', label: 'titis' },
          { kind: 'simple', bg: '#3a2e2a', fg: '#ffd5b5', label: 't', big: true },
        ];
        const renderVariant = (v) => {
          if (v.kind === 'line') {
            return (
              <div className="logo" style={{
                fontSize: 26, letterSpacing: -0.6, lineHeight: 0.9,
                transform: 'translateY(1px)', display: 'flex',
              }}>
                {['t','i','t','i','s'].map((l, i) => (
                  <span key={i} style={{ color: v.colors[i] }}>{l}</span>
                ))}
              </div>
            );
          }
          if (v.kind === 'stack') {
            return (
              <div className="logo" style={{
                fontSize: 38, letterSpacing: -1, lineHeight: 0.82,
                display: 'flex', flexDirection: 'column', alignItems: 'center',
                transform: 'translateY(1px)',
              }}>
                <div style={{ display: 'flex' }}>
                  <span style={{ color: v.colors[0] }}>t</span>
                  <span style={{ color: v.colors[1] }}>i</span>
                  <span style={{ color: v.colors[2] }}>t</span>
                </div>
                <div style={{ display: 'flex' }}>
                  <span style={{ color: v.colors[3] }}>i</span>
                  <span style={{ color: v.colors[4] }}>s</span>
                </div>
              </div>
            );
          }
          return (
            <div className="logo" style={{
              fontSize: v.big ? 58 : 26,
              color: v.fg,
              letterSpacing: -0.6,
              lineHeight: 0.9,
              transform: v.big ? 'translateY(6px)' : 'translateY(1px)',
            }}>{v.label}</div>
          );
        };
        return (
          <div style={{
            background: 'linear-gradient(180deg, #8fb8d6 0%, #c9b3d6 100%)',
            padding: '40px 32px',
            borderRadius: 28,
            width: 520,
            display: 'grid',
            gridTemplateColumns: 'repeat(4, 1fr)',
            gap: 28,
          }}>
            {variants.map((v, i) => (
              <div key={i} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
                <div style={{
                  width: size, height: size, borderRadius: 15,
                  background: v.bg,
                  boxShadow: '0 4px 10px rgba(0,0,0,0.15)',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  overflow: 'hidden',
                }}>
                  {renderVariant(v)}
                </div>
                <div style={{ fontSize: 11, color: '#fff', textShadow: '0 1px 2px rgba(0,0,0,0.3)' }}>titis</div>
              </div>
            ))}
            {/* filler app-looking squares so it reads as a home screen */}
            {[...Array(2)].map((_, i) => (
              <div key={'f'+i} style={{
                width: size, height: size, borderRadius: 15,
                background: 'rgba(255,255,255,0.25)',
                backdropFilter: 'blur(8px)',
              }} />
            ))}
          </div>
        );
      }

      function App() {
        return (
          <DesignCanvas>
            <DCSection
              title="titis — app logo explorations"
              subtitle="Bagel Fat One wordmark on a 240px squircle. Warm, soft, baby-friendly. 8 atomic variations — mix & match color, treatment, and mark.">
              <div />
            </DCSection>

            <DCSection title="Wordmark variations" subtitle="Full name, different color treatments">
              <DCArtboard label="01 — Cream + peach" width={ICON_SIZE} height={ICON_SIZE + 0} style={{ background: 'transparent', boxShadow: 'none' }}>
                <V1 />
                <Caption label="Default / safe bet" note="Warm and legible. Peach reads warm & caring; cream feels like baby skin / swaddle cloth." />
              </DCArtboard>
              <DCArtboard label="02 — Peach bg inverted" width={ICON_SIZE} height={ICON_SIZE} style={{ background: 'transparent', boxShadow: 'none' }}>
                <V2 />
                <Caption label="Bold inverted" note="Higher saturation — stands out on a crowded home screen." />
              </DCArtboard>
              <DCArtboard label="05 — Horizon split" width={ICON_SIZE} height={ICON_SIZE} style={{ background: 'transparent', boxShadow: 'none' }}>
                <V5 />
                <Caption label="Day / night" note="Alludes to a logbook's ruled line and the 24-hr rhythm of tracking feeds & sleep." />
              </DCArtboard>
              <DCArtboard label="06 — Pastel rainbow" width={ICON_SIZE} height={ICON_SIZE} style={{ background: 'transparent', boxShadow: 'none' }}>
                <V6 />
                <Caption label="Playful, multi-tone" note="Each letter a different soft pastel. Category-typical for baby apps, familiar." />
              </DCArtboard>
              <DCArtboard label="07 — Sticker outline" width={ICON_SIZE} height={ICON_SIZE} style={{ background: 'transparent', boxShadow: 'none' }}>
                <V7 />
                <Caption label="Sticker / toy" note="Hard dark outline + yellow = toy-box, cheerful, tactile." />
              </DCArtboard>
            </DCSection>

            <DCSection title="★ Two-line pastel rainbow" subtitle="Your pick, restacked as tit / is. Bigger type fills the squircle — more presence at small sizes.">
              <DCArtboard label="06 — One-line (original)" width={ICON_SIZE} height={ICON_SIZE} style={{ background: 'transparent', boxShadow: 'none' }}>
                <V6 />
                <Caption label="For reference" note="The original you liked — 5 letters, one line, lots of breathing room." />
              </DCArtboard>
              <DCArtboard label="06b — Two-line centered" width={ICON_SIZE} height={ICON_SIZE} style={{ background: 'transparent', boxShadow: 'none' }}>
                <V6b />
                <Caption label="Centered stack" note="tit / is, both lines centered. Type jumps from 108 → 150px — more impact on a home screen." />
              </DCArtboard>
              <DCArtboard label="06c — Two-line left-aligned" width={ICON_SIZE} height={ICON_SIZE} style={{ background: 'transparent', boxShadow: 'none' }}>
                <V6b align="flex-start" />
                <Caption label="Left-aligned stack" note="Both lines flush-left. Feels more like a logotype / signature." />
              </DCArtboard>
              <DCArtboard label="06d — Warm-only palette" width={ICON_SIZE} height={ICON_SIZE} style={{ background: 'transparent', boxShadow: 'none' }}>
                <V6b colors={['#f2805c', '#f5a04a', '#f5c24a', '#e68aa8', '#c94f6d']} />
                <Caption label="Sunset palette" note="Warmer, more cohesive — reads as one family rather than full rainbow." />
              </DCArtboard>
              <DCArtboard label="06e — Cool-only palette" width={ICON_SIZE} height={ICON_SIZE} style={{ background: 'transparent', boxShadow: 'none' }}>
                <V6b colors={['#5aa0e6', '#7fbf7a', '#5ac7c2', '#b98be0', '#8fb8d6']} />
                <Caption label="Ocean palette" note="Cool, calm, sleepy — leans into the nighttime / sleep-tracking side of the app." />
              </DCArtboard>
            </DCSection>

            <DCSection title="With a small mark" subtitle="The letterforms themselves become the graphic element">
              <DCArtboard label="03 — Dot party" width={ICON_SIZE} height={ICON_SIZE} style={{ background: 'transparent', boxShadow: 'none' }}>
                <V3 />
                <Caption label="Playful dots" note="All three round elements (two i-dots + t-crossbar top) become little bubbles / milk drops. No extra imagery needed — the type does the work." />
              </DCArtboard>
              <DCArtboard label="08 — Heart dot" width={ICON_SIZE} height={ICON_SIZE} style={{ background: 'transparent', boxShadow: 'none' }}>
                <V8 />
                <Caption label="One tiny heart" note="The middle i-dot swapped for a heart. Tender without being saccharine." />
              </DCArtboard>
              <DCArtboard label="04 — Single 't' monogram" width={ICON_SIZE} height={ICON_SIZE} style={{ background: 'transparent', boxShadow: 'none' }}>
                <V4 />
                <Caption label="Monogram" note="For when a wordmark is too much — e.g. Apple Watch, favicon. Full name tucked bottom-right." />
              </DCArtboard>
            </DCSection>

            <DCSection title="Home-screen check" subtitle="At 64px, ~real-world iOS icon size. Kept: the ones that stay legible.">
              <DCArtboard label="Preview" width={520} height={380} style={{ background: 'transparent', boxShadow: 'none', padding: 0 }}>
                <HomeScreenPreview />
              </DCArtboard>
              <DCPostIt top={40} left={560} rotate={3} width={240}>
                The two-line stack (<b>06b–e</b>) holds up much better than the one-line original at 64px — letters stay chunky and legible. My pick: <b>06b rainbow centered</b>.
              </DCPostIt>
            </DCSection>
          </DesignCanvas>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
