<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>titis</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Inter:wght@400;500;600&display=swap"/>
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    /* Brand palette — mirrors the 06d icon */
    --c-coral:  #f2805c;
    --c-yellow: #f5c24a;
    --c-green:  #7fbf7a;
    --c-blue:   #5aa0e6;
    --c-lilac:  #b98be0;
    --cream:    #fff6ea;
    --ink:      #2a2320;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: var(--cream);
    font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
    /* Respect safe areas on real devices */
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }

  /* ─── Animated gradient background ────────────────────────────────
     Four soft-tinted blobs drift slowly across a cream base.
     Deliberately low opacity so the cream stays dominant. */
  .bg {
    position: fixed; inset: 0;
    background: var(--cream);
    overflow: hidden;
    z-index: 0;
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.55;
    will-change: transform;
  }
  .blob-1 { width: 60vmax; height: 60vmax; background: var(--c-coral);  top: -20vmax; left: -20vmax; animation: drift1 18s ease-in-out infinite; }
  .blob-2 { width: 55vmax; height: 55vmax; background: var(--c-blue);   top: -10vmax; right: -25vmax; animation: drift2 22s ease-in-out infinite; }
  .blob-3 { width: 70vmax; height: 70vmax; background: var(--c-yellow); bottom: -30vmax; left: -15vmax; animation: drift3 26s ease-in-out infinite; }
  .blob-4 { width: 50vmax; height: 50vmax; background: var(--c-lilac);  bottom: -15vmax; right: -10vmax; animation: drift4 20s ease-in-out infinite; }

  @keyframes drift1 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(8vmax, 6vmax) scale(1.1); } }
  @keyframes drift2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-6vmax, 10vmax) scale(0.95); } }
  @keyframes drift3 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(10vmax,-8vmax) scale(1.08); } }
  @keyframes drift4 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-8vmax,-6vmax) scale(1.02); } }

  /* Soft cream wash on top to mute the gradient — keeps the icon high-contrast */
  .bg::after {
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, rgba(255,246,234,0.35) 0%, rgba(255,246,234,0.72) 70%, rgba(255,246,234,0.88) 100%);
  }

  /* ─── Content stack ───────────────────────────────────────────────── */
  .content {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 7vh;
    padding: 8vh 6vw;
  }

  /* Hide the logo until Bagel Fat One is ready — prevents FOUT / serif fallback
     during the bounce-in entry. Body gets .fonts-ready once the check passes. */
  .logo { visibility: hidden; }
  body.fonts-ready .logo { visibility: visible; }

  /* Logo wordmark — same geometry as 06d, scaled to viewport */
  .logo {
    font-family: 'Bagel Fat One', sans-serif;
    font-weight: 400;
    /* Size based on the narrower side so both portrait sizes work */
    font-size: min(34vw, 46vh);
    line-height: 0.82;
    letter-spacing: -0.025em;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* Matches the canvas version's +3px centering nudge, scaled */
    transform: translateX(0.5vw);
  }
  .logo .row {
    display: flex;
    gap: 0.02em;
  }
  .logo .row.row2 { margin-top: -0.04em; }

  .letter {
    display: inline-block;
    transform-origin: 50% 70%;
    /* Starting state — hidden, dropped in from above, ready to bounce */
    opacity: 0;
    transform: translateY(-0.35em) scale(0.6) rotate(var(--tilt));
    animation: letterIn 800ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    animation-delay: var(--delay);
    /* Per-letter vertical bob baseline */
    --bob: 0em;
  }
  /* After entry, apply the per-letter bob via the final rotate keeping transform clean */
  @keyframes letterIn {
    0%   { opacity: 0; transform: translateY(-0.4em) scale(0.55) rotate(calc(var(--tilt) * 0.3)); }
    60%  { opacity: 1; transform: translateY(0.06em) scale(1.06) rotate(calc(var(--tilt) * 1.1)); }
    80%  {             transform: translateY(-0.02em) scale(0.98) rotate(var(--tilt)); }
   100%  { opacity: 1; transform: translateY(var(--bob)) scale(1) rotate(var(--tilt)); }
  }

  /* Each letter — color, tilt, bob, entry delay */
  .L-t1 { color: var(--c-coral);  --tilt: -8deg; --bob:  0em;    --delay: 180ms; }
  .L-i1 { color: var(--c-yellow); --tilt:  6deg; --bob: -0.034em; --delay: 280ms; }
  .L-t2 { color: var(--c-green);  --tilt: -5deg; --bob:  0.017em; --delay: 380ms; }
  .L-i2 { color: var(--c-blue);   --tilt:  7deg; --bob: -0.025em; --delay: 520ms; }
  .L-s  { color: var(--c-lilac);  --tilt: -6deg; --bob:  0.008em; --delay: 620ms; }

  /* Infinite gentle wiggle after entry finishes — keeps the screen alive
     while the app loads. Very subtle; each letter on its own phase. */
  .letter.wiggle { animation: wiggle 3.6s ease-in-out infinite; }
  @keyframes wiggle {
    0%,100% { opacity: 1; transform: translateY(var(--bob)) rotate(var(--tilt)); }
    50%     { opacity: 1; transform: translateY(calc(var(--bob) - 0.015em)) rotate(calc(var(--tilt) + 1.5deg)); }
  }

  /* ─── Tagline ─────────────────────────────────────────────────────── */
  .tagline {
    font-family: Inter, sans-serif;
    font-weight: 500;
    font-size: clamp(20px, 3.6vw, 34px);
    color: var(--ink);
    letter-spacing: 0.01em;
    opacity: 0;
    transform: translateY(12px);
    animation: taglineIn 600ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    animation-delay: 1100ms;
  }
  @keyframes taglineIn {
    to { opacity: 0.75; transform: translateY(0); }
  }

  /* ─── Optional loading dots under the tagline ─────────────────────── */
  .dots {
    display: flex;
    gap: 10px;
    margin-top: 2vh;
    opacity: 0;
    animation: taglineIn 400ms ease-out forwards;
    animation-delay: 1500ms;
  }
  .dots span {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--ink);
    opacity: 0.25;
    animation: dotPulse 1.4s ease-in-out infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.18s; background: var(--c-coral); }
  .dots span:nth-child(3) { animation-delay: 0.36s; background: var(--c-blue);  }
  @keyframes dotPulse {
    0%,100% { transform: translateY(0);   opacity: 0.35; }
    50%     { transform: translateY(-6px); opacity: 1; }
  }

  /* Reduced motion — honor user preference */
  @media (prefers-reduced-motion: reduce) {
    .blob { animation: none; }
    .letter { animation-duration: 0.01ms; animation-delay: 0ms; }
    .letter.wiggle { animation: none; }
    .tagline { animation-duration: 0.01ms; animation-delay: 0ms; opacity: 0.75; transform: none; }
    .dots span { animation: none; }
  }
</style>
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
  </div>

  <main class="content">
    <div class="logo" aria-label="titis">
      <div class="row">
        <span class="letter L-t1">t</span>
        <span class="letter L-i1">i</span>
        <span class="letter L-t2">t</span>
      </div>
      <div class="row row2">
        <span class="letter L-i2">i</span>
        <span class="letter L-s">s</span>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;align-items:center;gap:2vh;">
      <div class="tagline">Baby log tracker</div>
      <div class="dots" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
    </div>
  </main>

  <script>
    // Wait for Bagel Fat One before revealing the logo so the bounce-in
    // animation is never rendered in the serif fallback.
    (async () => {
      const reveal = () => {
        document.body.classList.add('fonts-ready');
        // Re-trigger entry animation now that the font is correct.
        // (Restart by toggling a class; simplest: clone the letters via
        //  removing & reinserting a class that replays keyframes.)
        const letters = document.querySelectorAll('.letter');
        letters.forEach(el => {
          // Force reflow trick to restart CSS animation
          el.style.animation = 'none';
          void el.offsetWidth;
          el.style.animation = '';
        });
      };
      try {
        if (document.fonts && document.fonts.load) {
          // Explicitly request the weight/family we need
          await Promise.race([
            document.fonts.load('1em "Bagel Fat One"'),
            new Promise(res => setTimeout(res, 1500)), // safety timeout
          ]);
        }
      } catch (e) {}
      reveal();
    })();

    // After initial bounce-in finishes, add the gentle wiggle class.
    // Longest entry delay (620ms) + 800ms duration = 1420ms; add buffer.
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.querySelectorAll('.letter').forEach(el => el.classList.add('wiggle'));
      }, 1600);
    });
  </script>
</body>
</html>
